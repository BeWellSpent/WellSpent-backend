version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/query/"
    schema: "../SpendSense-Database/migrations/"
    gen:
      go:
        package: "db"
        out: "internal/sqlc"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        null_style: "sql"
        overrides:
          - db_type: "pg_catalog.numeric"
            go_type: "github.com/jackc/pgx/v5/pgtype.Numeric"
