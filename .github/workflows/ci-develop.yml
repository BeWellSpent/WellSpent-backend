name: CI — Develop

on:
  push:
    branches: [develop]

jobs:
  generate:
    name: Generate proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/buf-auth
        with:
          buf_token: ${{ secrets.BUF_TOKEN }}
      - name: Generate
        run: buf generate
      - uses: actions/upload-artifact@v4
        with:
          name: gen
          path: gen/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: gen
          path: gen/
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  migrate-dev:
    name: Migrate dev DB
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
        run: go run ./cmd/migrate up
